events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # HTTP -> HTTPS redirect + ACME challenge
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: API
    server {
        listen 443 ssl;
        server_name api.116.118.22.122.nip.io;

        ssl_certificate /etc/letsencrypt/live/api.116.118.22.122.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.116.118.22.122.nip.io/privkey.pem;

        location / {
            proxy_pass http://backend:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;
        }
    }

    # HTTPS: Admin (default)
    server {
        listen 443 ssl default_server;
        server_name admin.116.118.22.122.nip.io _;

        ssl_certificate /etc/letsencrypt/live/api.116.118.22.122.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.116.118.22.122.nip.io/privkey.pem;

        # Forward /api requests to backend
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve admin frontend
        location / {
            proxy_pass http://admin-frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
