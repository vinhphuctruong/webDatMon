version: "3.7"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zaui-food-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zaui_food
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zaui_food_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zaui_food"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: zaui-food-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zauifood.local
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zaui-food-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zaui_food?schema=public
      - PORT=8080
      - NUKE_SECRET_KEY=tm-food-nuke-2026-xR9kP#mZ
    depends_on:
      - postgres

  admin-frontend:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile
    container_name: zaui-food-admin
    restart: unless-stopped
    depends_on:
      - backend

  nginx-proxy:
    image: nginx:alpine
    container_name: zaui-food-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - admin-frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: zaui-food-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  zaui_food_pgdata:
  certbot_www:
  certbot_certs:
