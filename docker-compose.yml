version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zaui-food-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zaui_food
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zaui_food_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zaui_food"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: zaui-food-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zauifood.local
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  zaui_food_pgdata:
